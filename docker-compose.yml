services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: klaro
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: klaro
      PORT: 3000
      FRONTEND_URL: http://localhost:4200
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
      - ./backend/knexfile.config.ts:/app/knexfile.config.ts

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '4200:4200'
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
